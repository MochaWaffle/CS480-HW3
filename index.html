<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <div id='p'></div>
    <script>
        window.onload = function () {
            semesters = ['F16', 'S17', 'F17', 'S18', 'F18', 'S19', 'F19', 'S20', 'F20', 'S21',
                'F21', 'S22', 'F22', 'S23', 'F23'];
            faculty = {
                x: semesters,
                y: [27, 25, 22, 23, 23, 23, 24, 24, 24, 26, 25, 24, 23, 24],
                name: 'Faculty'
            };

            students = {
                x: semesters,
                y: [1004, 953, 1085, 1005, 1145, 1042, 1171, 1089, 1192, 1114, 1237, 1194,
                    1490, 1359, 1686],
                name: 'Students'
            };

            layout = {
                xaxis: { title: 'Semester' },
                yaxis: { title: 'Count' },
            };

            Plotly.newPlot('p', [students, faculty], layout);
        }
    </script>
</body>
</html>
